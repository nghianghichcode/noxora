<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;
    overflow:hidden;

    background:

    /* Glow principale */
    radial-gradient(circle at 18% 15%,
        rgba(48,110,170,.18),
        transparent 28%),

    /* Glow secondario */
    radial-gradient(circle at 85% 8%,
        rgba(35,85,150,.14),
        transparent 25%),

    /* Glow basso */
    radial-gradient(circle at 65% 85%,
        rgba(30,70,120,.08),
        transparent 35%),

    /* Micro contrasto */
    radial-gradient(circle at 50% 50%,
        rgba(255,255,255,.015),
        transparent 70%),

    linear-gradient(
        145deg,
        #040506 0%,
        #080B10 18%,
        #0C1118 40%,
        #111924 70%,
        #0E151E 100%
    );

}

/* Glow sinistro */

body::before{

    content:"";

    position:fixed;

    width:750px;
    height:750px;

    left:-220px;
    top:-220px;

    border-radius:50%;

    background:
    radial-gradient(circle,
        rgba(0,150,255,.15),
        transparent 70%);

    filter:blur(120px);

}

/* Glow destro */

body::after{

    content:"";

    position:fixed;

    width:700px;
    height:700px;

    right:-250px;
    bottom:-250px;

    border-radius:50%;

    background:
    radial-gradient(circle,
        rgba(80,120,220,.10),
        transparent 70%);

    filter:blur(140px);

}

</style>
</head>

<body>

</body>
</html>
